<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project UAS Flask</title>
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="flex flex-col h-full bg-zinc-50 text-zinc-800 antialiased selection:bg-indigo-500 selection:text-white">

    <header class="sticky top-0 z-40 w-full border-b border-zinc-200 bg-white/80 backdrop-blur-md">
        <div class="mx-auto flex h-16 max-w-5xl items-center justify-between px-6">
            <a href="/" class="group flex items-center gap-2 font-semibold text-zinc-900 transition">
                <span class="h-5 w-5 rounded bg-indigo-600 transition-transform group-hover:scale-110"></span>
                <span class="tracking-tight">MyProject</span>
            </a>
            
            <nav class="flex items-center gap-6 text-sm font-medium">
                <a href="/" class="text-zinc-600 hover:text-indigo-600 transition">Home</a>
                <a href="/about" class="text-zinc-600 hover:text-indigo-600 transition">About</a>
                <span class="h-4 w-px bg-zinc-200"></span>
                <span class="text-xs font-semibold uppercase tracking-wider text-zinc-400">UAS KDKA</span>
            </nav>
        </div>
    </header>

    <main class="mx-auto w-full max-w-5xl flex-1 animate-fade-in mt-2">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="border-t border-zinc-200 bg-white">
        <div class="mx-auto max-w-5xl px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-4 text-xs text-zinc-500">
            <p>© 2026 Project UAS. Hak Cipta Dilindungi.</p>
            <div class="flex gap-4">
                <span class="font-medium text-zinc-700">Dosen Pengampu: KDKA Team</span>
                <span class="text-zinc-300">|</span>
                <span>Khizg • Kelas UAS</span>
            </div>
        </div>
    </footer>

</body>
</html>
