{% extends 'base.html' %}

{% block content %}
<div class="flex flex-col lg:flex-row gap-6 h-[calc(100vh-12rem)]">
  
  <div class="flex-1 bg-white rounded-xl border border-zinc-200 shadow-sm p-4 flex flex-col justify-between">
    <div class="flex flex-col gap-2 border-b border-zinc-100 pb-3 mb-4">
      <div>
        <h2 class="font-semibold text-zinc-900">Peta Simulasi Robot</h2>
        <p class="text-xs text-zinc-500">Klik Kiri: Gambar Sesuai Kuas | Klik Kanan: Hapus (Jalan) | Ungu: Robot Fisik</p>
      </div>
    </div>

    <button 
      id="btnReset"
      class="w-xs bg-white hover:bg-rose-50 text-rose-600 font-medium py-2.5 px-4 my-2 rounded-lg border border-rose-200 transition text-sm"
    >
      Reset Peta
    </button>

    <div class="flex-1 flex items-center justify-center bg-zinc-100 rounded-lg border border-dashed border-zinc-300 relative overflow-hidden">
      <canvas id="simulasiCanvas" width="600" height="400" class="bg-white shadow-md rounded border border-zinc-300 cursor-crosshair"></canvas>
    </div>
  </div>

  <div class="w-full lg:w-80 bg-white rounded-xl border border-zinc-200 shadow-sm p-5 flex flex-col justify-between">
    <div class="space-y-6">
      <div>
        <h2 class="font-semibold text-zinc-900">Control Panel</h2>
        <p class="text-xs text-zinc-500">Pengaturan jadwal perpustakaan keliling</p>
      </div>

      <div class="space-y-4">
        <div>
          <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Pilih Hari</label>
          <select id="selectHari" class="w-full rounded-lg border border-zinc-300 bg-zinc-50 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none">
            <option>Senin</option><option>Selasa</option><option>Rabu</option>
            <option>Kamis</option><option>Jumat</option><option>Sabtu</option><option>Minggu</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Pilih Jam Operasional</label>
          <select id="selectJam" class="w-full rounded-lg border border-zinc-300 bg-zinc-50 px-3 py-2 text-sm focus:border-indigo-500 focus:outline-none">
            <option>08:00 - 10:00 (Pagi)</option>
            <option>12:00 - 14:00 (Siang/Macet)</option>
            <option>15:00 - 17:00 (Sore)</option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Kuas / Navigasi</label>
          <div class="grid grid-cols-2 gap-2">
            <button data-tool="7" class="tool-btn bg-zinc-900 text-white text-xs font-medium py-2 px-3 rounded-lg border border-zinc-900 shadow-sm ring-2 ring-indigo-500 ring-offset-2 flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-emerald-500"></span>Titik Mulai
            </button>
            <button data-tool="8" class="tool-btn bg-white hover:bg-zinc-50 text-zinc-700 text-xs font-medium py-2 px-3 rounded-lg border border-zinc-300 shadow-sm flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-blue-500"></span>Titik Selesai
            </button>
          </div>
          <div class="grid grid-cols-2 gap-2 mt-2">
            <button data-tool="1" class="tool-btn bg-white hover:bg-zinc-50 text-zinc-700 text-xs font-medium py-2 px-3 rounded-lg border border-zinc-300 shadow-sm flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-zinc-900 border border-zinc-400"></span>Tembok
            </button>
            <button data-tool="3" class="tool-btn bg-white hover:bg-zinc-50 text-zinc-700 text-xs font-medium py-2 px-3 rounded-lg border border-zinc-300 shadow-sm flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-gray-500"></span>Pemberhentian
            </button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-zinc-600 uppercase tracking-wider mb-1.5">Rintangan Dinamis</label>
          <div class="grid grid-cols-2 gap-2">
            <button data-tool="2" class="tool-btn bg-white hover:bg-zinc-50 text-zinc-700 text-xs font-medium py-2 px-3 rounded-lg border border-zinc-300 shadow-sm flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-amber-500"></span>Pasar (Macet)
            </button>
            <button data-tool="4" class="tool-btn bg-white hover:bg-zinc-50 text-zinc-700 text-xs font-medium py-2 px-3 rounded-lg border border-zinc-300 shadow-sm flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-orange-500"></span>Ev Pagi
            </button>
            <button data-tool="5" class="tool-btn bg-white hover:bg-zinc-50 text-zinc-700 text-xs font-medium py-2 px-3 rounded-lg border border-zinc-300 shadow-sm flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-red-500"></span>Ev Siang
            </button>
            <button data-tool="6" class="tool-btn bg-white hover:bg-zinc-50 text-zinc-700 text-xs font-medium py-2 px-3 rounded-lg border border-zinc-300 shadow-sm flex items-center gap-2 justify-center">
              <span class="h-2 w-2 rounded-full bg-purple-500"></span>Ev Sore
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="pt-4 border-t border-zinc-100 flex flex-col gap-2">
      <button id="btnGenerate" class="w-full bg-zinc-800 hover:bg-zinc-900 text-white font-medium py-2.5 px-4 rounded-lg shadow-sm transition flex items-center justify-center gap-2 text-sm">
        Generate Jalan
      </button>
      <button id="btnSimulasi" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-sm transition flex items-center justify-center gap-2 text-sm">
        Mulai Simulasi Web
      </button>
      <button id="btnRobotFisik" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-2.5 px-4 rounded-lg shadow-sm transition flex items-center justify-center gap-2 text-sm">
        <span class="h-2 w-2 rounded-full bg-white animate-pulse"></span> Kirim ke Robot Fisik
      </button>
    </div>
  </div>
</div>

<script>
  const RESOLUTION = 20;
  const ROUTE_COLOR = '#06b6d4'; // Warna Rute (Cyan)
  const PASSED_COLOR = '#e2e8f0'; // Warna jalan yang sudah dilewati robot fisik (Slate 200)

  const TILE_CONFIG = {
    0: { color: '#ffffff', isUnique: false }, 
    1: { color: '#18181b', isUnique: false }, 
    2: { color: '#f59e0b', isUnique: false }, 
    3: { color: '#6b7280', isUnique: false }, 
    4: { color: '#f97316', isUnique: false }, 
    5: { color: '#ef4444', isUnique: false }, 
    6: { color: '#a855f7', isUnique: false }, 
    7: { color: '#10b981', isUnique: true  }, // Start
    8: { color: '#3b82f6', isUnique: true  }  // Finish
  };

  const canvas = document.getElementById('simulasiCanvas');
  const ctx = canvas.getContext('2d');
  const btnReset = document.getElementById('btnReset');
  const btnGenerate = document.getElementById('btnGenerate');
  const btnSimulasi = document.getElementById('btnSimulasi');
  const btnRobotFisik = document.getElementById('btnRobotFisik');
  const toolButtons = document.querySelectorAll('.tool-btn');
  const selectHari = document.getElementById('selectHari');
  const selectJam = document.getElementById('selectJam');

  const COLS = canvas.width / RESOLUTION;
  const ROWS = canvas.height / RESOLUTION;

  let grid = Array(COLS).fill(null).map(() => Array(ROWS).fill(0));
  let currentTool = 7;

  // --- STATE ANIMASI SIMULASI WEB ---
  let generatedRoute = [];     
  let isSimulating = false;    
  let simIndex = 0;            
  const ROBOT_SPEED = 150; // Kecepatan gerak (ms)
  let simulationInterval = null; // Variabel baru pengontrol animasi

  // --- STATE BARU UNTUK MONITORING ROBOT FISIK ---
  let physicalRobotPos = null; 
  let jalanDilewati = [];      

  function drawGrid() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (let col = 0; col < COLS; col++) {
      for (let row = 0; row < ROWS; row++) {
        ctx.beginPath();
        ctx.rect(col * RESOLUTION, row * RESOLUTION, RESOLUTION, RESOLUTION);
        
        const tileType = grid[col][row];
        const isPassed = jalanDilewati.some(([cx, rx]) => cx === col && rx === row);
        
        if (isPassed && tileType !== 7 && tileType !== 8) {
          ctx.fillStyle = PASSED_COLOR; 
        } else {
          ctx.fillStyle = TILE_CONFIG[tileType]?.color || '#ffffff';
        }
        
        ctx.fill();
        ctx.strokeStyle = '#e4e4e7'; 
        ctx.stroke();
      }
    }
  }

  function clearUniqueInstance(toolId) {
    for (let c = 0; c < COLS; c++) {
      for (let r = 0; r < ROWS; r++) {
        if (grid[c][r] === toolId) grid[c][r] = 0;
      }
    }
  }

  function drawRoute(rute) {
    rute.forEach(([col, row]) => {
      if (grid[col][row] !== 7 && grid[col][row] !== 8) {
        ctx.fillStyle = ROUTE_COLOR;
        ctx.fillRect(col * RESOLUTION + 4, row * RESOLUTION + 4, RESOLUTION - 8, RESOLUTION - 8);
      }
    });
  }

  function drawRobot(col, row) {
    ctx.fillStyle = '#6366f1';    // Indigo 500
    ctx.strokeStyle = '#4f46e5';  // Border warna
    ctx.lineWidth = 2;
    ctx.beginPath();
    // Gambar robot kotak
    ctx.rect(col * RESOLUTION + 3, row * RESOLUTION + 3, RESOLUTION - 6, RESOLUTION - 6);
    ctx.fill();
    ctx.stroke();
  }

  function drawPhysicalRobot() {
    if (!physicalRobotPos) return;
    const [col, row] = physicalRobotPos;
    
    ctx.fillStyle = '#a855f7';    
    ctx.strokeStyle = '#7c3aed';  
    ctx.lineWidth = 2;
    
    ctx.beginPath();
    ctx.arc(col * RESOLUTION + RESOLUTION / 2, row * RESOLUTION + RESOLUTION / 2, RESOLUTION / 3, 0, 2 * Math.PI);
    ctx.fill();
    ctx.stroke();
  }

  // Polling Status Robot ESP32 (Hanya jalan saat tidak simulasi web)
  async function cekStatusRobotFisik() {
    if (isSimulating) return; 

    try {
      const response = await fetch('/api/robot/status');
      if (response.ok) {
        const data = await response.json();
        if (data.status === "running") {
          physicalRobotPos = data.posisi_sekarang;
          jalanDilewati = data.jalan_dilewati;
          
          drawGrid();
          drawRoute(generatedRoute);
          drawPhysicalRobot();
        }
      }
    } catch (error) {
      console.error("Gagal polling ESP32:", error);
    }
  }
  setInterval(cekStatusRobotFisik, 500);

  function handleDrawEvent(e) {
    if (isSimulating) return; 
    const rect = canvas.getBoundingClientRect();
    const col = Math.floor((e.clientX - rect.left) / RESOLUTION);
    const row = Math.floor((e.clientY - rect.top) / RESOLUTION);

    if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
      if (e.buttons === 1) {
        if (TILE_CONFIG[currentTool]?.isUnique) {
          clearUniqueInstance(currentTool);
        }
        grid[col][row] = currentTool;
      } else if (e.buttons === 2) {
        grid[col][row] = 0;
      }
      drawGrid();
    }
  }

  // --- KONTROL TOMBOL UI ---
  toolButtons.forEach(button => {
    button.addEventListener('click', () => {
      toolButtons.forEach(btn => {
        btn.classList.remove('bg-zinc-900', 'text-white', 'ring-2', 'ring-indigo-500', 'ring-offset-2');
        btn.classList.add('bg-white', 'text-zinc-700');
      });
      button.classList.remove('bg-white', 'text-zinc-700');
      button.classList.add('bg-zinc-900', 'text-white', 'ring-2', 'ring-indigo-500', 'ring-offset-2');
      currentTool = parseInt(button.getAttribute('data-tool'), 10);
    });
  });

  canvas.addEventListener('mousedown', handleDrawEvent);
  canvas.addEventListener('mousemove', handleDrawEvent);
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  btnReset.addEventListener('click', () => {
    isSimulating = false;
    clearInterval(simulationInterval);
    generatedRoute = [];
    physicalRobotPos = null;
    jalanDilewati = [];
    grid = Array(COLS).fill(null).map(() => Array(ROWS).fill(0));
    drawGrid();
  });

  btnGenerate.addEventListener('click', async () => {
    isSimulating = false;      
    clearInterval(simulationInterval);
    const payload = { hari: selectHari.value, jam: selectJam.value, peta: grid };
    
    try {
      const response = await fetch('/api/simulasi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      const result = await response.json();
      
      if (response.ok) {
        generatedRoute = result.rute; 
        drawGrid(); 
        drawRoute(generatedRoute);
      } else {
        alert(`Error dari server: ${result.message}`);
      }
    } catch (error) {
      console.error("Gagal terhubung ke server:", error);
    }
  });

  // --- LOGIKA ANIMASI YANG SUDAH DIPERBAIKI (MENGGUNAKAN SETINTERVAL) ---
  btnSimulasi.addEventListener('click', () => {
    if (!generatedRoute || generatedRoute.length === 0) {
      alert("Silakan klik 'Generate Jalan' terlebih dahulu sebelum memulai simulasi!");
      return;
    }
    
    if (isSimulating) return; // Mencegah klik berulang saat animasi jalan

    console.log("Animasi web dimulai...");
    isSimulating = true;
    simIndex = 0;

    // Bersihkan interval lama jika ada
    if (simulationInterval) clearInterval(simulationInterval);

    // Jalankan pergerakan robot setiap ROBOT_SPEED (150ms)
    simulationInterval = setInterval(() => {
      // 1. Cek apakah robot sudah di tujuan
      if (simIndex >= generatedRoute.length) {
        clearInterval(simulationInterval);
        isSimulating = false;
        
        // Render final map agar bersih
        drawGrid();
        drawRoute(generatedRoute);
        alert("Simulasi Selesai! Kotak robot telah mencapai tujuan.");
        return;
      }

      // 2. Render Peta dan Rute Biru
      drawGrid();
      drawRoute(generatedRoute);

      // 3. Render Robot Ungu/Indigo di posisinya saat ini
      const [currCol, currRow] = generatedRoute[simIndex];
      drawRobot(currCol, currRow);

      // 4. Lanjut ke langkah selanjutnya
      simIndex++;
    }, ROBOT_SPEED);
  });

  btnRobotFisik.addEventListener('click', async () => {
    if (!generatedRoute || generatedRoute.length === 0) {
      alert("Silakan klik 'Generate Jalan' terlebih dahulu sebelum mengirim rute!");
      return;
    }

    try {
      const response = await fetch('/api/robot/siapkan-rute', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rute: generatedRoute })
      });

      if (response.ok) {
        alert("Rute berhasil diunggah! Silakan nyalakan ESP32 Robot Fisik Anda.");
      } else {
        const errorData = await response.json();
        alert(`Gagal mengunggah rute: ${errorData.message}`);
      }
    } catch (error) {
      console.error("Koneksi gagal saat unggah rute:", error);
    }
  });

  // Render awal canvas saat halaman dimuat
  drawGrid();
</script>
{% endblock %}
